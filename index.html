<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI & DS CGPA Calculator</title>
<!-- Actual department logo as favicon (may require conversion to .ico for full browser support) -->
  <link rel="icon" href="images/Dept logo.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="images/Dept logo.jpg">
  <!-- Alternative formats for better compatibility -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/Dept logo.jpg">
  <link rel="icon" type="image/x-icon" href="images/Dept logo.jpg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div style="display:flex;gap:12px;align-items:center;">
        <img src="images/Dept logo.jpg" alt="Department Logo" class="logo-img">
        <div>
          <h1>AI & DS CGPA Calculator</h1>
          <div style="font-size:0.9rem;color:#475569;">Regulations: <span class="badge">2021 / 2025</span></div>
        </div>
      </div>
    </div>

    <!-- Method 1: Per-Course Grades -->
    <h2>Method 1: Enter Grades per Course</h2>
    <label>Select Regulation:</label>
    <select id="regulation" onchange="switchRegulation()">
      <option value="2021">Regulation 2021</option>
      <option value="2025">Regulation 2025</option>
    </select>

    <label style="margin-left:12px;">Select Semester:</label>
    <select id="semester" onchange="loadSubjects()">
      <option value="">-- Select --</option>
      <option value="1">Semester 1</option>
      <option value="2">Semester 2</option>
      <option value="3">Semester 3</option>
      <option value="4">Semester 4</option>
      <option value="5">Semester 5</option>
      <option value="6">Semester 6</option>
      <option value="7">Semester 7</option>
      <option value="8">Semester 8</option>
    </select>

    <table id="subjectsTable">
      <thead>
        <tr>
          <th>Course Code</th>
          <th>Subject</th>
          <th>Credits</th>
          <th>Grade</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button onclick="calculateSGPA()">Calculate SGPA</button>
    <h2 id="result"></h2>
    <p id="warning"></p>

    <hr>

    <!-- Method 2: Quick CGPA from Semester GPA -->
    <h2>Method 2: Quick CGPA from Semester GPA</h2>
    <table id="quickGpaTable">
      <thead>
        <tr>
          <th>Semester</th>
          <th>Total Credits</th>
          <th>GPA</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows generated dynamically -->
      </tbody>
    </table>
    <button onclick="calculateQuickCGPA()">Calculate CGPA (Quick Method)</button>
    <button id="pdfExportBtn" title="Click to download your CGPA report as PDF">Export as PDF</button>
    <h2 id="quickResult"></h2>
    
    <!-- Chart Container -->
    <div class="chart-container">
      <canvas id="sgpaChart"></canvas>
    </div>
  </div>

  <!-- Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- jsPDF Library for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
